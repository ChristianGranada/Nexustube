<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>NexusTube - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #0b1a2a, #1b3a5c);
        height: 100vh;
        font-family: "Orbitron", sans-serif;
        color: #c7d5e0;
      }

      .login-card {
        background-color: #171a21;
        border-radius: 15px;
        width: 100%;
        max-width: 380px;
        border: 1px solid #2a475e;
        box-shadow: 0 0 25px rgba(0, 140, 255, 0.3);
      }

      .brand-title {
        color: #66c0f4;
        font-weight: 800;
        letter-spacing: 2px;
        text-shadow: 0 0 10px rgba(102, 192, 244, 0.6);
      }

      .form-control {
        background-color: #2a475e;
        border: none;
        color: white;
      }

      .form-control:focus {
        background-color: #2a475e;
        color: white;
        box-shadow: 0 0 10px #66c0f4;
      }

      .btn-gamer {
        background: linear-gradient(90deg, #1b4f72, #66c0f4);
        border: none;
        color: white;
        font-weight: bold;
        transition: 0.3s;
      }

      .btn-gamer:hover {
        background: linear-gradient(90deg, #66c0f4, #1b4f72);
        box-shadow: 0 0 10px #66c0f4;
      }

      .icon {
        width: 60px;
        opacity: 0.8;
      }
    </style>
  </head>

  <body class="d-flex justify-content-center align-items-center">
    <div class="login-card p-4">
      <div class="text-center mb-3">
        <img
          src="https://img.freepik.com/vector-premium/ilustracion-diseno-insignia-mano-que-sostiene-joystick_1281743-4019.jpg?w=360"
          class="icon mb-2"
        />
        <h2 class="brand-title">NexusTube</h2>
      </div>

      <form>
        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <input
            type="text"
            id="usuario"
            class="form-control"
            placeholder="Ingresa tu usuario"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="••••••••"
          />
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" />
          <label class="form-check-label">Recordarme</label>
        </div>

        <button type="button" class="btn btn-gamer w-100" onclick="login()">
          Entrar
        </button>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="login.js"></script>
  </body>
</html>
